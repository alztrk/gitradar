services:
  - type: web
    name: gitradar-api
    env: node
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: GH_CLIENT_ID
        sync: false
      - key: GH_CLIENT_SECRET
        sync: false
      - key: BASE_URL
        value: https://gitradar-api.onrender.com
      - key: CORS_ORIGIN
        value: https://alztrk.github.io
      - key: SESSION_SECRET
        generateValue: true
